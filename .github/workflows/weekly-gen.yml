name: Weekly data generation

on:
  schedule:
    # Every Friday at 09:00 UTC
    - cron: '0 9 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-gen
  cancel-in-progress: false

jobs:
  generate-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate data
        run: pnpm gen

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): weekly sync from Google lib"
          title: "chore(data): weekly sync"
          body: |
            Automated weekly generation via GitHub Actions.

            This PR was created automatically after running `pnpm gen`.

            cc @stefashkaa
          branch: chore/weekly-gen
          branch-suffix: timestamp
          labels: |
            automation
            chore
            data
          assignees: |
            stefashkaa
          reviewers: |
            stefashkaa
          signoff: false
          delete-branch: true
          draft: false

      - name: PR created output
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          echo "Created PR #${{ steps.cpr.outputs.pull-request-number }}"

      - name: No changes detected
        if: steps.cpr.outputs.pull-request-number == ''
        run: echo "No changes to commit; skipping PR."
