name: Weekly data generation

on:
  schedule:
    # Every Friday at 09:00 UTC
    - cron: '0 9 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-gen
  cancel-in-progress: false

jobs:
  generate-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 25
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate data
        run: |
          pnpm gen
          git checkout -- package.json pnpm-lock.yaml

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725 # v8.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): weekly sync from Google lib"
          title: "chore(data): weekly sync"
          body: |
            Automated weekly generation via GitHub Actions.

            This PR was created automatically after running `pnpm gen`.

            cc @stefashkaa
          branch: chore/weekly-gen
          branch-suffix: timestamp
          labels: |
            automation
            chore
            data
          assignees: |
            stefashkaa
          reviewers: |
            stefashkaa
          signoff: false
          delete-branch: true
          draft: false

      - name: PR created output
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          echo "Created PR #${{ steps.cpr.outputs.pull-request-number }}"

      - name: No changes detected
        if: steps.cpr.outputs.pull-request-number == ''
        run: echo "No changes to commit; skipping PR."
