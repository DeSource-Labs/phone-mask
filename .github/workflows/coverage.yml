name: Coverage

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-coverage:
    name: Unit Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:unit:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: |
            ./packages/phone-mask/coverage/lcov.info
            ./packages/phone-mask-vue/coverage/lcov.info
            ./packages/phone-mask-react/coverage/lcov.info
            ./packages/phone-mask-svelte/coverage/lcov.info
            ./packages/phone-mask-nuxt/coverage/lcov.info
