name: Coverage

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-coverage:
    name: Unit Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run unit tests with coverage
        run: pnpm test:unit:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: |
            ./packages/phone-mask/coverage/lcov.info
            ./packages/phone-mask-vue/coverage/lcov.info
            ./packages/phone-mask-react/coverage/lcov.info
            ./packages/phone-mask-svelte/coverage/lcov.info
            ./packages/phone-mask-nuxt/coverage/lcov.info
